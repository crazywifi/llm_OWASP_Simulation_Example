<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWASP Agentic AI Top 10 - Interactive Attack Simulations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(90deg, #e94560, #ff9800, #4caf50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #aaa;
            font-size: 1.1em;
        }

        .vulnerability-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .vulnerability-selector label {
            font-size: 1.1em;
            color: #4caf50;
        }

        .vulnerability-selector select {
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #4caf50;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            cursor: pointer;
            min-width: 400px;
        }

        .vulnerability-selector select:focus {
            outline: none;
            border-color: #e94560;
        }

        .scenario-box {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
            border: 2px solid #2196f3;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .scenario-box h2 {
            color: #2196f3;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scenario-box .vuln-id {
            background: #e94560;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8em;
        }

        .scenario-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .scenario-section h3 {
            color: #ff9800;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .scenario-section p, .scenario-section ul {
            color: #ccc;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .scenario-section ul {
            list-style: none;
            padding-left: 0;
        }

        .scenario-section ul li {
            padding: 3px 0;
        }

        .scenario-section ul li::before {
            content: "▸ ";
            color: #4caf50;
        }

        .attacker-goal {
            background: rgba(233, 69, 96, 0.2);
            border-left: 4px solid #e94560;
            padding: 15px;
            margin-top: 15px;
            grid-column: 1 / -1;
        }

        .attacker-goal h3 {
            color: #e94560;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .mode-toggle {
            display: flex;
            background: #1a1a2e;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid #333;
        }

        .mode-btn {
            padding: 12px 30px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #4caf50;
            color: #fff;
        }

        .mode-btn.attack.active {
            background: #e94560;
        }

        .run-btn {
            padding: 12px 40px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #4caf50, #2196f3);
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .run-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .run-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            padding: 12px 30px;
            border: 2px solid #ff9800;
            border-radius: 30px;
            background: transparent;
            color: #ff9800;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: #ff9800;
            color: #000;
        }

        .progress-container {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4caf50, #2196f3);
            transition: width 0.5s;
        }

        .progress-fill.attack {
            background: linear-gradient(90deg, #e94560, #ff9800);
        }

        .step-indicators {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }

        .step-indicator {
            padding: 8px 15px;
            background: #333;
            border-radius: 20px;
            font-size: 0.85em;
            color: #888;
            transition: all 0.3s;
        }

        .step-indicator.active {
            background: #4caf50;
            color: #fff;
        }

        .step-indicator.danger {
            background: #e94560;
            color: #fff;
            animation: pulse 1s infinite;
        }

        .step-indicator.complete {
            background: #2196f3;
            color: #fff;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .main-content {
            display: grid;
            grid-template-columns: 200px 1fr 280px;
            gap: 20px;
        }

        .actors-panel {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 15px;
        }

        .actors-panel h3 {
            color: #4caf50;
            margin-bottom: 15px;
            text-align: center;
        }

        .actor {
            background: #2a2a4e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            text-align: center;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .actor.active {
            border-color: #4caf50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
        }

        .actor.attacker {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
        }

        .actor.attacker.active {
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
        }

        .actor-icon {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .actor-name {
            font-size: 0.85em;
            color: #ccc;
        }

        .actor-role {
            font-size: 0.7em;
            color: #888;
            margin-top: 3px;
        }

        .simulation-panel {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            min-height: 500px;
        }

        .simulation-panel h3 {
            color: #2196f3;
            margin-bottom: 20px;
            text-align: center;
        }

        .json-display {
            background: #0d1117;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            font-family: 'Consolas', monospace;
            font-size: 0.85em;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }

        .json-display.visible {
            display: block;
            animation: fadeIn 0.5s;
        }

        .json-display.malicious {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .json-display h4 {
            color: #4caf50;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .json-display.malicious h4 {
            color: #e94560;
        }

        .json-key {
            color: #79c0ff;
        }

        .json-string {
            color: #a5d6ff;
        }

        .json-number {
            color: #ff7b72;
        }

        .json-danger {
            color: #e94560;
            font-weight: bold;
        }

        .comparison-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
            display: none;
        }

        .comparison-box.visible {
            display: grid;
            animation: fadeIn 0.5s;
        }

        .comparison-side {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid #333;
        }

        .comparison-side.before {
            border-color: #4caf50;
        }

        .comparison-side.after {
            border-color: #e94560;
        }

        .comparison-side h4 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.85em;
        }

        .comparison-side.before h4 {
            color: #4caf50;
        }

        .comparison-side.after h4 {
            color: #e94560;
        }

        .activity-panel {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 15px;
        }

        .activity-panel h3 {
            color: #ff9800;
            margin-bottom: 15px;
            text-align: center;
        }

        .activity-log {
            max-height: 250px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 8px;
            border-left: 3px solid #4caf50;
            background: rgba(76, 175, 80, 0.1);
            margin-bottom: 8px;
            font-size: 0.8em;
            border-radius: 0 5px 5px 0;
            animation: slideIn 0.3s;
        }

        .log-entry.warning {
            border-color: #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }

        .log-entry.danger {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .log-entry.info {
            border-color: #2196f3;
            background: rgba(33, 150, 243, 0.1);
        }

        .log-time {
            color: #888;
            font-size: 0.85em;
        }

        .attacker-view {
            margin-top: 20px;
            background: rgba(233, 69, 96, 0.15);
            border: 2px solid #e94560;
            border-radius: 10px;
            padding: 15px;
            display: none;
        }

        .attacker-view.visible {
            display: block;
            animation: fadeIn 0.5s;
        }

        .attacker-view h4 {
            color: #e94560;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stolen-data {
            background: #0d1117;
            border-radius: 5px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 0.8em;
            color: #e94560;
        }

        .flow-animation {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 10px;
        }

        .flow-animation.visible {
            display: flex;
            animation: fadeIn 0.5s;
        }

        .flow-node {
            padding: 10px 15px;
            background: #2a2a4e;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85em;
        }

        .flow-node.source {
            border: 2px solid #4caf50;
        }

        .flow-node.target {
            border: 2px solid #e94560;
        }

        .flow-arrow {
            color: #e94560;
            font-size: 1.5em;
            animation: flowPulse 1s infinite;
        }

        @keyframes flowPulse {
            0%, 100% { opacity: 1; transform: translateX(0); }
            50% { opacity: 0.5; transform: translateX(5px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .impact-summary {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(255, 152, 0, 0.2));
            border: 2px solid #e94560;
            border-radius: 12px;
        }

        .impact-summary.visible {
            display: block;
            animation: fadeIn 0.5s;
        }

        .impact-summary h3 {
            color: #e94560;
            margin-bottom: 15px;
            text-align: center;
        }

        .impact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .impact-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .impact-item .icon {
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .impact-item .label {
            color: #888;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .impact-item .value {
            color: #e94560;
            font-weight: bold;
        }

        .teaching-points {
            margin-top: 20px;
            padding: 20px;
            background: rgba(33, 150, 243, 0.1);
            border: 2px solid #2196f3;
            border-radius: 12px;
            display: none;
        }

        .teaching-points.visible {
            display: block;
            animation: fadeIn 0.5s;
        }

        .teaching-points h3 {
            color: #2196f3;
            margin-bottom: 15px;
        }

        .teaching-points ul {
            list-style: none;
        }

        .teaching-points li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #ccc;
        }

        .teaching-points li::before {
            content: "💡";
            position: absolute;
            left: 0;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .actors-panel {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }

            .actor {
                flex: 0 0 auto;
                margin-bottom: 0;
            }
        }

        @media (max-width: 768px) {
            .scenario-content {
                grid-template-columns: 1fr;
            }

            .vulnerability-selector select {
                min-width: 100%;
            }

            .comparison-box {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">

                        json: { status: "success", recommendations: ["remove_additional_backup_assets", "disable_unused_disaster_recovery_regions"], note: "Harmful behavior continues even after attacker is gone!" },
                        malicious: true
                    }
                ],
                impact: {

                    "Agent 'learned' to prioritize cost over safety",

        let currentVuln = 'ASI01';
        let currentMode = 'normal';
        let isRunning = false;
        let currentStep = 0;

        function loadVulnerability() {
            currentVuln = document.getElementById('vulnSelect').value;
            resetSimulation();
            renderScenario();
            renderActors();
            renderSteps();
        }

        function renderScenario() {
            const vuln = vulnerabilities[currentVuln];
            document.getElementById('scenarioBox').innerHTML = `
                <h2><span class="vuln-id">${currentVuln}</span> ${vuln.title}</h2>
                <div class="scenario-content">
                    <div class="scenario-section">
                        <h3>🏢 ${vuln.company} - ${vuln.platform}</h3>
                        <p>${vuln.description}</p>
                    </div>
                    <div class="scenario-section">
                        <h3>🔧 Agent Capabilities</h3>
                        <ul>
                            ${vuln.capabilities.map(c => `<li>${c}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="scenario-section">
                        <h3>⚠️ Vulnerability</h3>
                        <p>${vuln.vulnerability}</p>
                    </div>
                    <div class="attacker-goal">
                        <h3>🎯 Attacker's Goal</h3>
                        <p>${vuln.attackerGoal}</p>
                    </div>
                </div>
            `;
        }

        function renderActors() {
            const vuln = vulnerabilities[currentVuln];
            const actors = currentMode === 'normal' ? vuln.actors.normal : vuln.actors.attack;
            
            document.getElementById('actorsContainer').innerHTML = actors.map((actor, i) => `
                <div class="actor ${actor.isAttacker ? 'attacker' : ''}" id="actor${i}">
                    <div class="actor-icon">${actor.icon}</div>
                    <div class="actor-name">${actor.name}</div>
                    <div class="actor-role">${actor.role}</div>
                </div>
            `).join('');
        }

        function renderSteps() {
            const vuln = vulnerabilities[currentVuln];
            document.getElementById('stepIndicators').innerHTML = vuln.steps.map((step, i) => 
                `<div class="step-indicator" id="step${i}">${step}</div>`
            ).join('');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('normalBtn').classList.toggle('active', mode === 'normal');
            document.getElementById('attackBtn').classList.toggle('active', mode === 'attack');
            
            const progressFill = document.getElementById('progressFill');
            progressFill.classList.toggle('attack', mode === 'attack');
            
            resetSimulation();
            renderActors();
        }

        function resetSimulation() {
            currentStep = 0;
            isRunning = false;
            
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('simulationContent').innerHTML = '<p style="color:#888;text-align:center;margin-top:50px;">Click "Run Simulation" to begin...</p>';
            document.getElementById('activityLog').innerHTML = '';
            document.getElementById('attackerView').classList.remove('visible');
            document.getElementById('flowAnimation').classList.remove('visible');
            document.getElementById('impactSummary').classList.remove('visible');
            document.getElementById('teachingPoints').classList.remove('visible');
            document.getElementById('runBtn').disabled = false;
            
            // Reset step indicators
            document.querySelectorAll('.step-indicator').forEach(el => {
                el.classList.remove('active', 'danger', 'complete');
            });
            
            // Reset actors
            document.querySelectorAll('.actor').forEach(el => {
                el.classList.remove('active');
            });
        }

        async function runSimulation() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('runBtn').disabled = true;
            
            const vuln = vulnerabilities[currentVuln];
            const flow = currentMode === 'normal' ? vuln.normalFlow : vuln.attackFlow;
            const totalSteps = flow.length;
            
            document.getElementById('simulationContent').innerHTML = '';
            
            for (let i = 0; i < totalSteps; i++) {
                currentStep = i;
                const step = flow[i];
                const progress = ((i + 1) / totalSteps) * 100;
                
                // Update progress
                document.getElementById('progressFill').style.width = `${progress}%`;
                
                // Update step indicators
                const stepEl = document.getElementById(`step${i}`);
                if (stepEl) {
                    stepEl.classList.add(step.malicious ? 'danger' : 'active');
                    if (i > 0) {
                        const prevStep = document.getElementById(`step${i-1}`);
                        if (prevStep) {
                            prevStep.classList.remove('active', 'danger');
                            prevStep.classList.add('complete');
                        }
                    }
                }
                
                // Add log entry
                addLogEntry(step.title, step.malicious ? 'danger' : 'info');
                
                // Render step content
                await renderStep(step, i);
                
                // Wait
                await sleep(currentMode === 'attack' && step.malicious ? 2000 : 1500);
            }
            
            // Mark last step complete
            const lastStep = document.getElementById(`step${totalSteps - 1}`);
            if (lastStep) {
                lastStep.classList.remove('active', 'danger');
                lastStep.classList.add('complete');
            }
            
            // Show impact and teaching points for attack mode
            if (currentMode === 'attack') {
                showImpact(vuln);
                showTeachingPoints(vuln);
                showAttackerView(vuln);
            }
            
            isRunning = false;
        }

        async function renderStep(step, index) {
            const content = document.getElementById('simulationContent');
            
            if (step.comparison) {
                // Render comparison view
                const compBox = document.createElement('div');
                compBox.className = 'comparison-box visible';
                compBox.innerHTML = `
                    <div class="comparison-side before">
                        <h4>✅ Before Attack</h4>
                        ${formatJson(step.comparison.before)}
                    </div>
                    <div class="comparison-side after">
                        <h4>💀 After Hijack</h4>
                        ${formatJson(step.comparison.after)}
                    </div>
                `;
                content.appendChild(compBox);
            } else {
                // Render JSON display
                const jsonBox = document.createElement('div');
                jsonBox.className = `json-display visible ${step.malicious ? 'malicious' : ''}`;
                jsonBox.innerHTML = `
                    <h4>${step.malicious ? '⚠️ ' : ''}${step.title}</h4>
                    ${formatJson(step.json)}
                `;
                content.appendChild(jsonBox);
            }
            
            // Scroll to bottom
            content.scrollTop = content.scrollHeight;
        }

        function formatJson(obj) {
            let html = '<pre>';
            html += JSON.stringify(obj, null, 2)
                .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
                .replace(/: "([^"]+)"/g, ': <span class="json-string">"$1"</span>')
                .replace(/: (\d+)/g, ': <span class="json-number">$1</span>')
                .replace(/(ATTACKER|HIJACK|POISON|MALICIOUS|ROGUE|💀|⚠️|EXPOSED|SKIPPED|OVERRIDE|exfil|attacker)/gi, '<span class="json-danger">$1</span>');
            html += '</pre>';
            return html;
        }

        function addLogEntry(message, type = 'info') {
            const log = document.getElementById('activityLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">${time}</span> ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function showImpact(vuln) {
            const impact = vuln.impact;
            document.getElementById('impactSummary').innerHTML = `
                <h3>💥 Attack Impact Summary</h3>
                <div class="impact-grid">
                    <div class="impact-item">
                        <div class="icon">📊</div>
                        <div class="label">Records Affected</div>
                        <div class="value">${impact.records}</div>
                    </div>
                    <div class="impact-item">
                        <div class="icon">🔓</div>
                        <div class="label">Data Exposed</div>
                        <div class="value">${impact.data}</div>
                    </div>
                    <div class="impact-item">
                        <div class="icon">🔍</div>
                        <div class="label">Detection</div>
                        <div class="value">${impact.detection}</div>
                    </div>
                    <div class="impact-item">
                        <div class="icon">💰</div>
                        <div class="label">Estimated Cost</div>
                        <div class="value">${impact.cost}</div>
                    </div>
                </div>
            `;
            document.getElementById('impactSummary').classList.add('visible');
        }

        function showTeachingPoints(vuln) {
            document.getElementById('teachingPoints').innerHTML = `
                <h3>🎓 Key Teaching Points</h3>
                <ul>
                    ${vuln.teachingPoints.map(p => `<li>${p}</li>`).join('')}
                </ul>
            `;
            document.getElementById('teachingPoints').classList.add('visible');
        }

        function showAttackerView(vuln) {
            const attackerView = document.getElementById('attackerView');
            attackerView.classList.add('visible');
            document.getElementById('stolenData').innerHTML = `
                ✅ Attack Successful!<br>
                📍 Vulnerability: ${currentVuln}<br>
                🎯 Goal: ${vuln.attackerGoal}<br>
                💀 Impact: ${vuln.impact.records}
            `;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadVulnerability();
        });
    </script>
